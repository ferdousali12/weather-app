<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="weather_container">
          <div class="temp">
            <p>20<span class="degree">°C</span></p>
          </div>

          <div class="time_location">
            <p>Peshawar</p>
            <p>12:58 - Monday 2022-9-26</p>
          </div>

          <div class="condition">
            <p>Mist</p>
          </div>
        </div>

        <nav>
          <form class="search_form">
            <input
              type="text"
              placeholder="Search for location"
              class="search_area"
            />
            <button type="submit">Search</button>
          </form>
        </nav>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
